<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abdul Moeed CV</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="top-bar">
      <div class="name">
        <p class="top-bar-element">Abdul Moeed Maan CV</p>
      </div>
      <div class="icons">
        <button class="top-bar-element" id="dark-mode">
          <i class="fa-regular fa-moon"></i>
        </button>
        <a href="files/Abdul Moeed CV.pdf" download
          ><button class="top-bar-element" id="download">
            <i class="fa-solid fa-arrow-down"></i>
          </button>
        </a>
        <a href="contact.html" target="_blank">
          <button class="top-bar-element" id="email">
            <i class="fa-regular fa-envelope"></i>
          </button>
        </a>
      </div>
    </div>
    <div class="container">
      <div class="border">
        <h2>Contact Form</h2>
        <form class="form">
          <div class="form-element">
            <p> Name:</p>
            <input type="text" placeholder="Enter your name"/>
          </div>
          <div class="form-element">
            <p> Email:</p>
            <input type="email" placeholder="Enter your email"/>
          </div>
          <div class="form-element">
            <p> Message:</p>
            <textarea placeholder="Enter your message"></textarea>
          </div>
          <!-- <div class="form-element"> -->
            <button>Submit</button>
          <!-- </div> -->
        </form>
      </div>
    </div>
  </body>
</html>
